<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Drone Track">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#041224"/>
      <stop offset="60%" stop-color="#052748"/>
      <stop offset="100%" stop-color="#020a17"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8be9ff"/>
      <stop offset="100%" stop-color="#39b5ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <g opacity="0.2" stroke="#79d9ff" stroke-width="2">
    <path d="M0 640L1280 480"/>
    <path d="M0 680L1280 520"/>
    <path d="M0 600L1280 440"/>
  </g>
  <g fill="none" stroke="url(#ring)" stroke-width="16" filter="url(#glow)">
    <polygon points="640,150 770,220 770,360 640,430 510,360 510,220"/>
    <polygon points="640,240 700,275 700,335 640,370 580,335 580,275"/>
  </g>
  <g fill="#a6ecff" filter="url(#glow)">
    <circle cx="330" cy="560" r="70" opacity="0.65"/>
    <circle cx="500" cy="590" r="85" opacity="0.5"/>
    <circle cx="450" cy="490" r="55" opacity="0.7"/>
  </g>
  <g transform="translate(360 500)">
    <rect x="180" y="20" width="200" height="30" rx="12" fill="#2f4f6e"/>
    <line x1="220" y1="35" x2="180" y2="10" stroke="#83e8ff" stroke-width="8"/>
    <line x1="340" y1="35" x2="380" y2="10" stroke="#83e8ff" stroke-width="8"/>
    <line x1="220" y1="35" x2="180" y2="60" stroke="#83e8ff" stroke-width="8"/>
    <line x1="340" y1="35" x2="380" y2="60" stroke="#83e8ff" stroke-width="8"/>
    <ellipse cx="180" cy="10" rx="26" ry="6" fill="#9df1ff"/>
    <ellipse cx="380" cy="10" rx="26" ry="6" fill="#9df1ff"/>
    <ellipse cx="180" cy="60" rx="26" ry="6" fill="#9df1ff"/>
    <ellipse cx="380" cy="60" rx="26" ry="6" fill="#9df1ff"/>
  </g>
</svg>
